name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

        **Note:** fond is a local-first, offline-first tool. Features that require
        a server for core functionality are out of scope. fond does not track
        calories/diets and has no social features.
  - type: textarea
    id: problem
    attributes:
      label: Is this related to a problem?
      description: A clear description of the problem this would solve
      placeholder: "I'm frustrated when..."
  - type: textarea
    id: solution
    attributes:
      label: Describe the feature
      description: A clear description of what you'd like to happen
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternatives you've considered
  - type: dropdown
    id: component
    attributes:
      label: Crate / Component
      description: Which part of fond would this affect?
      options:
        - CLI (fond)
        - Core library (fond-core)
        - Domain model (fond-domain)
        - Database / search (fond-store)
        - Import pipeline (fond-import) — new import source
        - Web scraping (fond-scrape)
        - Timeline engine (fond-timeline)
        - Documentation
        - Not sure
  - type: dropdown
    id: phase
    attributes:
      label: Which roadmap phase does this relate to?
      description: See ROADMAP.md for phase details
      options:
        - "Phase 0: First Recipe"
        - "Phase 1: Minimum Usable Kitchen (MVP)"
        - "Phase 2: Cook's Companion (Beta)"
        - "Phase 3: Family Kitchen (1.0)"
        - "Phase 4: Web Interface"
        - "Phase 5: Native Apple Apps"
        - "Phase 6: Smart Features"
        - "Phase 7: Sync & Multi-Device"
        - "Phase 8: Moonshots"
        - "Not sure"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information, mockups, or screenshots
